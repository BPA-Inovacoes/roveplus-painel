# Build
[build]
  command = "npm run db:generate && npm run build:api && npm run build && node scripts/copy-server-for-netlify.js"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

# Functions (API Express como serverless)
[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Redirects: API para a function, resto para SPA
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
